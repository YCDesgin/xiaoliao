name: Build FC proxy (Linux)

# 在 Linux 沙箱里为阿里云 FC 代理打部署包（含 Linux 版 ffmpeg-static 二进制）。
# 用法：GitHub → Actions → 本工作流 → Run workflow → 下载产物 fc-proxy-deploy.zip
# 然后把该 zip 上传到阿里云 FC 控制台对应函数即可。无需本机 WSL、无需阿里云凭证。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FC proxy deps (Linux)
        working-directory: aliyun-tts-proxy
        run: npm install

      - name: Verify ffmpeg binary is Linux ELF
        working-directory: aliyun-tts-proxy
        run: file node_modules/ffmpeg-static/ffmpeg

      - name: Package deploy zip
        working-directory: aliyun-tts-proxy
        run: zip -r ../fc-proxy-deploy.zip . -x "node_modules/.cache/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fc-proxy-deploy
          path: fc-proxy-deploy.zip
