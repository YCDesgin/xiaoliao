name: Build FC proxy (Linux)

# 在 Linux 沙箱里为阿里云 FC 代理打部署包（含 Linux 版 ffmpeg-static 二进制）。
# 用法：GitHub → Actions → 本工作流 → Run workflow → 下载产物（是一个 zip）
# 解压该 zip 后直接得到代码目录（index.js / package.json / node_modules/ 等），
# 把整个目录重新打包成 zip（index.js 在根）或直接在 FC 控制台"上传代码→文件夹"上传。
# 注意：下载的 artifact 本身会被 GitHub 包一层 zip，解压一次即得代码，无需再解压第二层。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FC proxy deps (Linux)
        working-directory: aliyun-tts-proxy
        run: npm install

      - name: Verify ffmpeg binary is Linux ELF
        working-directory: aliyun-tts-proxy
        run: file node_modules/ffmpeg-static/ffmpeg

      - name: Upload artifact (code dir, no nested zip)
        uses: actions/upload-artifact@v4
        with:
          name: fc-proxy-deploy
          path: aliyun-tts-proxy
