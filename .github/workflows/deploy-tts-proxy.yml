name: Deploy TTS Proxy to Aliyun FC

# 自动部署「虾聊」阿里云 TTS/ASR 代理（aliyun-tts-proxy）到阿里云函数计算（FC 3.0）。
#
# ⚠️ 重要：GitHub 官方托管 runner（美国 Azure）无法直连阿里云杭州端点
# （中美跨境链路被丢弃，实测 connect 120s 超时），因此本工作流【不能】在
# 普通 ubuntu-latest runner 上自动运行。
# 现改为：仅手动触发（workflow_dispatch）+ 需一个位于中国的自托管 runner
# （label: aliyun-cn）。在配好自托管 runner 之前，请用本机脚本部署：
#   powershell -ExecutionPolicy Bypass -File scripts/deploy-local.ps1
#
# 凭据：通过环境变量 ALIBABA_CLOUD_ACCESS_KEY_ID / ALIBABA_CLOUD_ACCESS_KEY_SECRET 注入
#       （本机从仓库根 .env.local 读取，该文件已被 .gitignore 忽略）。

on:
  workflow_dispatch:

# 只读取仓库内容；部署凭据通过 env 注入，无需额外权限。
permissions:
  contents: read

jobs:
  deploy:
    # 必须是中国境内的自托管 runner，否则无法直连阿里云杭州。
    runs-on: [self-hosted, aliyun-cn]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install FC proxy deps (Linux ffmpeg-static + deploy SDK)
        working-directory: aliyun-tts-proxy
        run: npm ci

      - name: Package proxy directory into zip (incl. Linux ffmpeg in node_modules)
        run: cd aliyun-tts-proxy && zip -r ../tts-proxy-deploy.zip . -x '*.git*'

      - name: Deploy to Aliyun FC (UpdateFunctionCode)
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: node scripts/deploy-tts-proxy.mjs tts-proxy-deploy.zip
